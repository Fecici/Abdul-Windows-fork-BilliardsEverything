apply plugin: 'application'
apply plugin: 'cpp'
apply plugin: TestingModelBasePlugin
//apply plugin: 'findbugs'

// At top level of build.gradle
def currentOs = org.gradle.internal.os.OperatingSystem.current()
def currentArch = System.getProperty("os.arch")
def osName = org.gradle.internal.os.OperatingSystem.current()
def platform = org.gradle.internal.os.OperatingSystem.current().isMacOsX() ? 'mac-aarch64' :
               org.gradle.internal.os.OperatingSystem.current().isLinux() ? 'linux' : 'win'
def isLinux = org.gradle.internal.os.OperatingSystem.current().isLinux()
def isMac = currentOs.isMacOsX()
def isWindows = currentOs.isWindows()
def javafxVersion = '21.0.1'
def defaultMsys2Root = (System.getenv('MSYS2_ROOT') ?: 'C:/msys64').replace('\\', '/')
ext.msys2NativePrefix = (
        System.getenv('BILLIARDS_MSYS2_PREFIX')
        ?: (file("${defaultMsys2Root}/ucrt64/bin/g++.exe").exists()
            ? "${defaultMsys2Root}/ucrt64"
            : file("${defaultMsys2Root}/mingw64/bin/g++.exe").exists()
                ? "${defaultMsys2Root}/mingw64"
                : "${defaultMsys2Root}/ucrt64")
).replace('\\', '/')

def propertyOrEnv = { String propertyName, String envName, String defaultValue ->
    def propertyValue = findProperty(propertyName)
    if (propertyValue != null && propertyValue.toString().trim()) {
        return propertyValue.toString().trim()
    }

    def envValue = System.getenv(envName)
    if (envValue != null && envValue.trim()) {
        return envValue.trim()
    }

    return defaultValue
}

def booleanPropertyOrEnv = { String propertyName, String envName, boolean defaultValue ->
    propertyOrEnv(propertyName, envName, defaultValue.toString()).toBoolean()
}

// Runtime/build knobs are project-local and temporary: pass -P... on the Gradle command line or set the matching env
// var for the shell/IDE process. They do not change the machine-wide Java or MSYS2 installation.
def billiardsAppXms = propertyOrEnv('billiardsXms', 'BILLIARDS_XMS', '2g')
def billiardsAppXmx = propertyOrEnv('billiardsXmx', 'BILLIARDS_XMX', '6g')
def billiardsDirectMemory = propertyOrEnv('billiardsDirectMemory', 'BILLIARDS_DIRECT_MEMORY', '2g')
def billiardsShowVmSettings = booleanPropertyOrEnv('billiardsShowVmSettings', 'BILLIARDS_SHOW_VM_SETTINGS', false)
def billiardsNativeDebug = booleanPropertyOrEnv('billiardsNativeDebug', 'BILLIARDS_NATIVE_DEBUG', false)
def billiardsNativeCpuTuned = booleanPropertyOrEnv('billiardsNativeCpuTuned', 'BILLIARDS_NATIVE_CPU_TUNED', false)
def billiardsNativeLto = booleanPropertyOrEnv('billiardsNativeLto', 'BILLIARDS_NATIVE_LTO', false)

mainClassName = 'billiards.viewer.Main'

repositories {
    mavenCentral()
}

dependencies {
    // When getting the version number for a dependency, don't go to Maven Central and
    // simply search for the package you want. You will often find many versions of the
    // package, most of which are unofficial or out-of-date. Instead, go to the website
    // of the package, and they will usually give you the correct Maven information there.
    implementation 'org.eclipse.collections:eclipse-collections-api:9.2.0'  // All the interfaces
    implementation 'org.eclipse.collections:eclipse-collections:9.2.0'  // The actual classes
    implementation 'com.google.guava:guava:25.1-jre'
    implementation 'org.apache.commons:commons-math3:3.6.1'
    implementation 'org.apache.commons:commons-lang3:3.7'  // can remove this now I think?
    implementation 'org.apache.commons:commons-io:1.3.2'
    implementation 'io.javaslang:javaslang:2.0.5'
    implementation "org.openjfx:javafx-base:${javafxVersion}:${platform}"
    implementation "org.openjfx:javafx-controls:${javafxVersion}:${platform}"
    implementation "org.openjfx:javafx-graphics:${javafxVersion}:${platform}"
    implementation "org.openjfx:javafx-fxml:${javafxVersion}:${platform}"
    implementation 'org.xerial:sqlite-jdbc:3.41.2.2'
    implementation 'net.java.dev.jna:jna:5.13.0'
    implementation 'org.fxmisc.richtext:richtextfx:0.10.4'
    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.2.0'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.2.0'
}

test {
    useJUnitPlatform()
}

compileJava {
    //options.compilerArgs << '-Xlint' << '-Werror'
    options.compilerArgs << '-Xlint'

    if (platform == 'linux') {
        options.compilerArgs += [
            '--module-path', '/usr/share/openjfx/lib',
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    } else {
        options.compilerArgs += [
            '--module-path', configurations.runtimeClasspath.asPath,
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    }
}

jar {
    archivesBaseName = 'billiard-viewer'
    if (System.getProperty('os.name').toLowerCase().contains('linux')) {
        dependsOn "backendSharedLibrary"

    }
    duplicatesStrategy(DuplicatesStrategy.EXCLUDE)
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
        configurations.compileClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
exclude 'META-INF/*.RSA', 'META-INF/*.SF','META-INF/*.DSA'
    manifest.attributes 'Main-Class': 'billiards.viewer.Main'
}

sourceSets {
    main {
        java {
            srcDir 'src/java'
        }

        //resources {
            //srcDir 'css'
        //}
    }
}

applicationDefaultJvmArgs = ['-server',
                            "-Djna.library.path=${projectDir}/build/libs/backend/shared",
                            //'-Xss1000m',
                            '-Xss2m',
                            "-Xms${billiardsAppXms}",
                            "-Xmx${billiardsAppXmx}",
                            "-XX:MaxDirectMemorySize=${billiardsDirectMemory}",
                            '-XX:+UnlockDiagnosticVMOptions']

if (billiardsShowVmSettings) {
    applicationDefaultJvmArgs += ['-XX:NativeMemoryTracking=summary', '-XshowSettings:vm']
}

sourceCompatibility = JavaVersion.VERSION_17
targetCompatibility = JavaVersion.VERSION_17

model {

    platforms {
        x64 {
            architecture "x86_64"
        }
    }

    toolChains {
        gcc(Gcc) {
            if (currentOs.isWindows()) {
                path "${msys2NativePrefix}/bin"
            }
        }
    }

    components {

        backend(NativeLibrarySpec) {

            targetPlatform "x64"

            binaries.all {

                if (billiardsNativeDebug) {
                    // Debug mode keeps assertions enabled and preserves useful C++ stack frames/locals for GDB or LLDB.
                    // Use -Og instead of -O0 because verify.cpp contains unused legacy helper functions that reference
                    // unimplemented half-triple predicates; at -O0 GCC still emits them and the DLL link fails.
                    cppCompiler.args '-g3', '-Og', '-fno-omit-frame-pointer'
                } else {
                    cppCompiler.define "NDEBUG"
                    if (billiardsNativeCpuTuned) {
                        // Opt-in speed build for the local CPU only. Do not use this for binaries distributed to
                        // other Windows machines, because -march=native can emit unsupported instructions there.
                        cppCompiler.args '-O3', '-march=native', '-ftrapv'
                    } else {
                        cppCompiler.args '-O2', '-mtune=generic', '-ftrapv'
                    }
                }
                if (billiardsNativeLto && !currentOs.isWindows() && !billiardsNativeDebug) {
                    cppCompiler.args '-flto'
                }
                if (currentOs.isWindows()) {
                    cppCompiler.args "-I${msys2NativePrefix}/include",
                                     "-I${msys2NativePrefix}/include/eigen3"
                    linker.args "-L${msys2NativePrefix}/lib"
                }
                // Aug,8 2025 Marco,Mai
                // for Aplle Arm platnorm there is an instruction to use java17 natively
                if (currentOs.isMacOsX()){
                    cppCompiler.args '-I/opt/homebrew/include'
                    linker.args '-headerpad_max_install_names', '-L/opt/homebrew/lib','-L/opt/homebrew/opt/','-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb','-lboost_thread', '-lboost_system'
                } else if (currentOs.isWindows()) {
                    linker.args '-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb12','-lboost_thread-mt', '-lws2_32'
                } else {
                    linker.args '-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb12','-lboost_thread', '-lboost_system'
                }
                
                if (toolChain in Clang) {
                    cppCompiler.args '-Werror',
                                     '-Wno-padded', '-Wno-comma',
                                     '-Wno-exit-time-destructors', '-Wno-global-constructors',
                                     '-Wno-c++98-compat', '-Wno-c++98-compat-pedantic',
                                     '-std=c++14'
                }

                if (toolChain in Gcc) {
                    cppCompiler.args '-Wextra', '-Wpedantic', '-Werror',
                                     '-Wno-c++11-compat', '-Wno-c++14-compat',
                                     '-std=c++14'
                }

                checkedBy $.tasks.testBackend
            }
        }

        test(NativeExecutableSpec) {

            targetPlatform "x64"

            sources.cpp {
                lib library: 'backend', linkage: 'static'
            }

            binaries.all {

                if (billiardsNativeDebug) {
                    // Match the backend library mode so test failures are debuggable with the same symbols/frames.
                    cppCompiler.args '-g3', '-Og', '-fno-omit-frame-pointer'
                } else {
                    cppCompiler.define "NDEBUG"
                    if (billiardsNativeCpuTuned) {
                        cppCompiler.args '-O3', '-march=native', '-ftrapv'
                    } else {
                        cppCompiler.args '-O2', '-mtune=generic', '-ftrapv'
                    }
                }
                if (billiardsNativeLto && !currentOs.isWindows() && !billiardsNativeDebug) {
                    cppCompiler.args '-flto'
                }
                if (currentOs.isWindows()) {
                    cppCompiler.args "-I${msys2NativePrefix}/include",
                                     "-I${msys2NativePrefix}/include/eigen3"
                    linker.args "-L${msys2NativePrefix}/lib"
                }
                // Aug,8 2025 Marco,Mai
                // for Aplle Arm platnorm there is an instruction to use java17 natively
                if (currentOs.isMacOsX()){
                    cppCompiler.args '-I/opt/homebrew/include'
                    linker.args '-headerpad_max_install_names','-L/opt/homebrew/lib','-L/opt/homebrew/opt/','-lboost_unit_test_framework','-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb','-lboost_thread','-lboost_system'
                } else if (currentOs.isWindows()) {
                    // MSYS2/UCRT packages TBB 2021+ as tbb12. Keep the test
                    // executable aligned with backend.dll or native tests fail
                    // to link even when the production backend links cleanly.
                    linker.args '-lboost_unit_test_framework-mt','-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb12','-lboost_thread-mt', '-lws2_32'
                } else {
                    linker.args '-lgmp', '-lmpfr', '-lmpfi', '-lsqlite3', '-ltbb','-lboost_thread','-lboost_system'
                }

                if (toolChain in Clang) {
                    cppCompiler.args  '-Werror',
                                     '-Wno-padded', '-Wno-comma',
                                     '-Wno-disabled-macro-expansion', '-Wno-global-constructors',
                                     '-Wno-c++98-compat', '-Wno-c++98-compat-pedantic',
                                     '-std=c++14'
                }

                if (toolChain in Gcc) {
                    cppCompiler.args '-Wall', '-Wextra', '-Wpedantic', '-Werror',
                                     '-Wno-c++11-compat', '-Wno-c++14-compat',
                                     '-std=c++14'
                }
            }
        }
    }
}

task testBackend(type: Exec, dependsOn: 'testExecutable') {
    commandLine 'build/exe/test/test'

    // The native test executable links the same GMP/MPFR/MPFI/TBB/Boost/SQLite
    // DLLs as backend.dll. Gradle's old C++ plugin does not inherit the run
    // task's PATH setup, so Windows tests need the MSYS2 bin directory here.
    if (isWindows) {
        environment 'PATH', "${msys2NativePrefix}/bin;" + System.getenv('PATH')
    }

    // save the results here
    //standardOutput = new FileOutputStream('build/test-results/test.out')
    //errorOutput = new FileOutputStream('build/test-results/test.err')
}

// Make sure the C++ code is up to date when running the Java program
run.dependsOn "backendSharedLibrary"
//run.dependsOn "coverExecutable"

run.doFirst {
    // Having this hardcoded isn't the best, put it works for now
    //environment 'LD_PRELOAD', '/usr/local/Cellar/jemalloc/5.0.1/lib/libjemalloc.so.2'
    //commandLine "./test.fish"
            // For native libraries
    def backendSharedDir = "$projectDir/build/libs/backend/shared"
    environment 'JNA_LIBRARY_PATH', backendSharedDir
    
    if (isMac) {
        environment 'DYLD_LIBRARY_PATH', backendSharedDir
        jvmArgs += [
            '--module-path', configurations.runtimeClasspath.asPath,
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    }
    else if (isLinux) {
        environment 'LD_LIBRARY_PATH', backendSharedDir
        jvmArgs += [
            '--module-path', '/usr/share/openjfx/lib',
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    } else {
        environment 'PATH', "${backendSharedDir};${msys2NativePrefix}/bin;" + System.getenv('PATH')
        jvmArgs += [
            '--module-path', configurations.runtimeClasspath.asPath,
            '--add-modules', 'javafx.controls,javafx.fxml'
        ]
    }
}

task createLibraryFolders {
    if (!file('build/dists/linux-x86-64').exists()) {
        file('build/dists/linux-x86-64').mkdirs()
        file('build/dists/x86-64-win32').mkdirs()
    }
}
task copyRuntimeLibs(type: Copy) {
    from configurations.runtimeClasspath
    into "$buildDir/libs"
}

task runtimeClasspathAsPath {
    doLast {
        println configurations.runtimeClasspath.asPath
    }
}
